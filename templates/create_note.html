{% extends "base.html" %}
{% block title %}New Note — Notes Pro{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>New Note</h1>
    <p class="page-sub">Capture your thoughts</p>
  </div>
  <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">← Back</a>
</div>

<div class="editor-layout">
  <form method="POST" enctype="multipart/form-data" class="note-form">
    <div class="form-row">
      <div class="form-group flex-1">
        <label>Title *</label>
        <input type="text" name="title" required placeholder="Note title..." class="input-lg" />
      </div>
      <div class="form-group form-group-sm">
        <label>Subject</label>
        <select name="subject_id">
          <option value="">— None —</option>
          {% for sub in subjects %}
          <option value="{{ sub.id }}">{{ sub.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Tags <small>(comma-separated)</small></label>
      <input type="text" name="tags" placeholder="python, chapter-3, important" />
    </div>

    <div class="form-group">
      <label>Content <small>(Markdown supported)</small></label>
      <div class="editor-toolbar">
        <button type="button" onclick="insertMd('**','**')" title="Bold"><b>B</b></button>
        <button type="button" onclick="insertMd('*','*')" title="Italic"><i>I</i></button>
        <button type="button" onclick="insertMd('# ','')" title="Heading">H1</button>
        <button type="button" onclick="insertMd('## ','')" title="Heading 2">H2</button>
        <button type="button" onclick="insertMd('- ','')" title="List">• List</button>
        <button type="button" onclick="insertMd('```\n','\n```')" title="Code">{'</>'}Code</button>
        <button type="button" onclick="togglePreview()" id="previewBtn">👁 Preview</button>
      </div>
      <textarea name="content" id="noteContent" rows="16" placeholder="Write your notes here... Markdown is supported!"></textarea>
      <div id="previewPane" class="markdown-preview hidden"></div>
    </div>

    <div class="form-row">
      <div class="form-group flex-1">
        <label>Attach File <small>(PDF or image, max 16 MB)</small></label>
        <input type="file" name="file" accept=".pdf,.png,.jpg,.jpeg,.gif,.webp" />
      </div>
      <div class="form-group form-check-group">
        <label class="toggle-label">
          <input type="checkbox" name="is_public" id="isPublic" />
          <span class="toggle-track"></span>
          Make note public (share link)
        </label>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Note</button>
      <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
function insertMd(before, after) {
  const ta = document.getElementById('noteContent');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel = ta.value.substring(start, end);
  ta.value = ta.value.substring(0, start) + before + sel + after + ta.value.substring(end);
  ta.focus();
}
function togglePreview() {
  const ta = document.getElementById('noteContent');
  const pane = document.getElementById('previewPane');
  const btn = document.getElementById('previewBtn');
  if (pane.classList.toggle('hidden')) {
    btn.textContent = '👁 Preview'; ta.classList.remove('hidden');
  } else {
    pane.innerHTML = marked.parse(ta.value || '*Nothing to preview yet.*');
    btn.textContent = '✏️ Edit'; ta.classList.add('hidden');
  }
}
</script>
{% endblock %}
