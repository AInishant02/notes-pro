{% extends "base.html" %}
{% block title %}Login — Notes Pro{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Notes Pro" style="width:64px;height:64px;border-radius:14px;object-fit:cover;margin:0 auto;display:block;">
    <div class="auth-brand">
      <div class="auth-brand-title"><span class="brand-notes">Notes</span><span class="brand-pro">Pro</span></div>
      <div class="auth-brand-tagline">ORGANIZE &bull; LEARN &bull; ACHIEVE</div>
    </div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Log in to your Notes Pro account</p>

    <form method="POST">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" />
      </div>
      <div class="form-check">
        <input type="checkbox" name="remember" id="remember" />
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
